<!-- Mermaid.js client-side rendering -->
<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
  mermaid.initialize({
    startOnLoad: true,
    theme:
      document.documentElement.getAttribute("data-mode") === "dark"
        ? "dark"
        : "default",
    securityLevel: "loose",
    fontFamily: "var(--font-family)",
  });
</script>
